name: "Deployment"
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  app-deployment:
    name: 🚀 Deploy app
    runs-on: ubuntu-latest

    steps:
      # This step creates a new deployment, check them out here:
      # https://github.com/khenziii/star-pass-discord/deployments
      - name: Start Deployment
        uses: bobheadxi/deployments@v1
        id: deployment
        with:
          step: start
          token: ${{ secrets.GITHUB_TOKEN }}
          env: Production - app

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: poetry install
      
      - name: Login to Github's Container Registry
        uses: docker/login-action@v3
        with:
          registry: https://ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: poetry run docker

      - name: Push Docker image
        run: docker push ghcr.io/khenziii/star-pass-discord:latest

      # TODO: No deployment webhook yet.
      # - name: Trigger Deployment Webhook
      #   run: |
      #     curl "${{ secrets.DEPLOY_WEBHOOK_URL }}"

      - name: Update Deployment Status
        uses: bobheadxi/deployments@v1
        if: always()
        with:
          step: finish
          token: ${{ secrets.GITHUB_TOKEN }}
          status: ${{ job.status }}
          env: ${{ steps.deployment.outputs.env }}
          deployment_id: ${{ steps.deployment.outputs.deployment_id }}
